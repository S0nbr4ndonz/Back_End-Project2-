spring.application.name=JobApplicationTracker
server.port=${PORT:8080}

# ---------- Database (example placeholders) ----------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ---------- OAuth (GitHub) ----------
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
spring.security.oauth2.client.registration.github.redirect-uri=${app.base-url}/login/oauth2/code/github

# If you add Google later, you can enable these:
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-ssecret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email

## ---------- Session cookie behavior (dev) ----------
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Lax

## Debugging security (optional)
logging.level.org.springframework.security=DEBUG

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=DEBUG
logging.level.org.springframework.boot.sql.init=DEBUG