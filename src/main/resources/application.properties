spring.application.name=JobApplicationTracker
server.port=${PORT:8080}
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# ---------- Database (example placeholders) ----------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


# ---------- OAuth (GitHub) ----------
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
app.admin.github-login=${ADMIN_GITHUB_LOGIN:}
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}
app.frontend.success-url=${FRONTEND_SUCCESS_URL:${app.frontend.origin}/oauth-success}
spring.security.oauth2.client.registration.github.redirect-uri=${app.base-url}/login/oauth2/code/github

# If you add Google later, configure these env vars and use
# ${APP_BASE_URL}/login/oauth2/code/google as an authorized redirect URI.
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email
# spring.security.oauth2.client.registration.google.redirect-uri=${app.base-url}/login/oauth2/code/google

## ---------- Session cookie behavior (dev) ----------
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
server.forward-headers-strategy=framework

## Debugging security (optional)
logging.level.org.springframework.security=DEBUG

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=DEBUG
logging.level.org.springframework.boot.sql.init=DEBUG
